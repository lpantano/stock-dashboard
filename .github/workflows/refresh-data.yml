name: Refresh S&P 500 Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC (fresh after weekend)

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.62.1
          cache: true

      - name: Fetch latest S&P 500 data
        run: pixi run fetch-data

      - name: Commit updated data
        run: |
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/data/sp500.json
            git commit -m "chore: refresh S&P 500 data $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No data changes to commit"
          fi

      - name: Trigger Netlify rebuild
        if: success() && env.NETLIFY_BUILD_HOOK != ''
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: curl -s -X POST "$NETLIFY_BUILD_HOOK"
